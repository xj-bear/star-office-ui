<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大龙的办公室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
        }

        /* Phaser will auto-size #game-container via its Scale Manager */
        #game-container {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Status bar: floating at bottom-center, above the game */
        #status-text {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: #eee;
            font-size: clamp(10px, 1.5vw, 14px);
            background: rgba(0, 0, 0, 0.75);
            padding: 6px 16px;
            border-radius: 4px;
            max-width: 92vw;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 100;
            pointer-events: none;
        }

        /* Dashboard: elegant glass panel at top-right */
        #dashboard {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(15, 15, 30, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 10px 14px;
            min-width: 160px;
            max-width: 220px;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #dashboard-title {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* On very small screens, compact horizontal bar at bottom */
        @media (max-width: 480px) {
            #dashboard {
                top: auto;
                bottom: 40px;
                right: 6px;
                left: 6px;
                max-width: none;
                flex-direction: row;
                min-width: 0;
                padding: 6px 10px;
                border-radius: 10px;
            }

            #dashboard-title {
                display: none;
            }

            #dashboard-agents {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
            }
        }

        .dash-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 4px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .dash-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .dash-item .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: all 0.4s;
        }

        .dash-item .dot.idle {
            background: #4a5568;
            box-shadow: none;
        }

        .dash-item .dot.working {
            background: #2ecc71;
            box-shadow: 0 0 6px #2ecc71, 0 0 12px rgba(46, 204, 113, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }

        .dash-item .name {
            color: #e2e8f0;
            font-size: 11px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dash-item .state {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.35);
            white-space: nowrap;
        }

        .dash-item .state.on {
            color: #2ecc71;
            font-weight: bold;
        }

        .dash-item .name {
            color: #fff;
            font-weight: bold;
        }

        .dash-item .state {
            color: #95a5a6;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <div id="status-text">加载中...</div>
    <div id="dashboard">
        <div id="dashboard-title">AGENTS</div>
        <div id="dashboard-agents"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        let uiConfig = {};
        let agentList = ['main'];

        const gameConfig = {
            type: Phaser.AUTO,
            width: 1200,
            height: 900,
            parent: 'game-container',
            pixelArt: true,
            backgroundColor: '#1a1a2e',
            scale: {
                mode: Phaser.Scale.FIT,          // Proportional scale to fit viewport
                autoCenter: Phaser.Scale.CENTER_BOTH, // Center horizontally & vertically
                width: 1200,
                height: 900,
            },
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        // ─── Per-agent data ────────────────────────────────────────────
        let agents = [];
        let game;
        let statusText;
        let lastFetch = 0;
        const FETCH_INTERVAL = 2000;
        const BLINK_INTERVAL = 2500;
        const BUBBLE_INTERVAL = 8000;

        // ─── PERSISTENT worker tracking ────────────────────────────────
        let currentGlobalState = 'idle';          // track last known global state
        let activeWorkerIds = new Set();           // persists across polls

        const SKINS = ['lobster', 'robot', 'cat', 'slime', 'ghost', 'kitty',
            'bunny', 'frog', 'fox', 'bear', 'duck', 'penguin', 'panda', 'dog', 'crab'];

        // ─── Helper: random point inside an area (supports {x,y} point or {x,y,w,h} rect) ──
        function randomPtInArea(areaKey) {
            let a = (uiConfig.areas && uiConfig.areas[areaKey]) || { x: 600, y: 450 };
            if (a.w && a.h) {
                // Rectangle: random within the rect
                return { x: a.x + Math.random() * a.w, y: a.y + Math.random() * a.h };
            } else {
                // Point: random offset ±30px around center
                return { x: a.x + (Math.random() - 0.5) * 60, y: a.y + (Math.random() - 0.5) * 60 };
            }
        }

        // ─── Phaser preload ────────────────────────────────────────────
        function preload() {
            this.load.image('office_bg', uiConfig.office_bg || '/static/office_bg.png');
            SKINS.forEach(s => {
                this.load.spritesheet(s, `/static/${s}.png`, { frameWidth: 48, frameHeight: 48 });
            });
            if (uiConfig.avatar_sheetUrl) {
                this.load.spritesheet('avatar_sheet', uiConfig.avatar_sheetUrl, { frameWidth: 48, frameHeight: 48 });
            }
        }

        // ─── Phaser create ─────────────────────────────────────────────
        function create() {
            game = this;
            this.add.image(600, 450, 'office_bg');

            // Create per-skin animations
            SKINS.forEach(skin => {
                if (!this.textures.exists(skin)) return;
                this.anims.create({ key: `${skin}_idle`, frames: [{ key: skin, frame: 0 }], frameRate: 1 });
                this.anims.create({
                    key: `${skin}_blink`,
                    frames: [{ key: skin, frame: 1 }, { key: skin, frame: 0 }],
                    frameRate: 6, repeat: 0
                });
                this.anims.create({
                    key: `${skin}_walk`,
                    frames: this.anims.generateFrameNumbers(skin, { start: 2, end: 3 }),
                    frameRate: 6, repeat: -1
                });
            });

            if (this.textures.exists('avatar_sheet')) {
                this.anims.create({ key: 'legacy_idle', frames: [{ key: 'avatar_sheet', frame: 0 }], frameRate: 1 });
                this.anims.create({ key: 'legacy_blink', frames: [{ key: 'avatar_sheet', frame: 1 }, { key: 'avatar_sheet', frame: 0 }], frameRate: 6, repeat: 0 });
                this.anims.create({ key: 'legacy_walk', frames: this.anims.generateFrameNumbers('avatar_sheet', { start: 2, end: 3 }), frameRate: 6, repeat: -1 });
            }

            // Spawn in IDLE areas only (never workdesk/editdesk/alert)
            const idleSpawnAreas = ['slacking', 'coffee'];

            // Create agent sprites + nametags
            agentList.forEach((agentId, idx) => {
                let skinKey = null;
                if (uiConfig.avatars && uiConfig.avatars[agentId]) {
                    let extracted = uiConfig.avatars[agentId].split('/').pop().split('.')[0];
                    if (SKINS.includes(extracted) && game.textures.exists(extracted)) skinKey = extracted;
                }
                if (!skinKey && game.textures.exists('avatar_sheet')) skinKey = 'legacy';
                if (!skinKey) skinKey = 'slime';

                let spawnAreaKey = idleSpawnAreas[idx % idleSpawnAreas.length];
                let pt = randomPtInArea(spawnAreaKey);

                let sprite = game.physics.add.sprite(pt.x, pt.y, skinKey === 'legacy' ? 'avatar_sheet' : skinKey);
                sprite.setOrigin(0.5);
                sprite.setDepth(10 + idx);
                sprite.play(`${skinKey}_idle`);

                let nametag = game.add.text(pt.x, pt.y + 30, agentId, {
                    font: '10px monospace', fill: '#ffffff', stroke: '#000000', strokeThickness: 3, align: 'center'
                }).setOrigin(0.5).setDepth(9);

                agents.push({
                    id: agentId, sprite, skinKey, nametag,
                    targetX: pt.x, targetY: pt.y,
                    currentState: 'idle',
                    currentAreaKey: spawnAreaKey,
                    lastDetail: null,
                    bubble: null,
                    bubbleTimeout: null,
                    disableRandomWander: 0,
                    lastBlink: 0,
                    lastBubble: Math.random() * BUBBLE_INTERVAL,  // 随机错开气泡初始时间
                    bubbleJitter: Math.floor(Math.random() * 6000) - 3000  // 每人独有的随机偏移 ±3s
                });
            });

            // Click interaction
            this.input.on('pointerdown', function (pointer) {
                if (agents.length === 0) return;
                let a = agents[Math.floor(Math.random() * agents.length)];
                const phrases = ["喊我干什么？", "你要我去哪里？", "我在摸鱼，别打扰我！", "咖啡真好喝", "又让我跑腿...", "来啦来啦"];
                const phrase = phrases[Math.floor(Math.random() * phrases.length)];
                if (phrase.includes("咖啡")) {
                    const ca = (uiConfig.areas && uiConfig.areas['coffee']) || { x: 868, y: 663 };
                    a.targetX = ca.x + (Math.random() - 0.5) * 40;
                    a.targetY = ca.y + (Math.random() - 0.5) * 40;
                } else {
                    a.targetX = pointer.x;
                    a.targetY = pointer.y;
                }
                a.disableRandomWander = game.time.now + 8000;
                showBubble(a, phrase);
            });

            // Plaque
            const plaqueText = uiConfig.plaque_text || '大龙的海鲜市场办公室';
            game.add.rectangle(600, 850, 380, 40, 0x5d4037).setStrokeStyle(3, 0x3e2723).setDepth(50);
            game.add.text(600, 850, plaqueText, {
                font: '18px monospace', fill: '#ffd700', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5).setDepth(51);
            game.add.text(430, 850, '⭐', { font: '20px' }).setOrigin(0.5).setDepth(51);
            game.add.text(770, 850, '⭐', { font: '20px' }).setOrigin(0.5).setDepth(51);

            statusText = document.getElementById('status-text');
            renderDashboard();
            fetchStatus();
        }

        // ─── Phaser update ─────────────────────────────────────────────
        function update(time) {
            if (time - lastFetch > FETCH_INTERVAL) { fetchStatus(); lastFetch = time; }

            agents.forEach(a => {
                // Blink
                if (time - a.lastBlink > BLINK_INTERVAL) {
                    if (a.sprite.anims.currentAnim && a.sprite.anims.currentAnim.key === `${a.skinKey}_idle`) {
                        a.sprite.play(`${a.skinKey}_blink`);
                        a.sprite.once('animationcomplete', () => {
                            if (a.sprite.anims.currentAnim && a.sprite.anims.currentAnim.key !== `${a.skinKey}_walk`)
                                a.sprite.play(`${a.skinKey}_idle`);
                        });
                    }
                    a.lastBlink = time;
                }

                // Random bubble (每个 Agent 有独立的随机偏移)
                const personalInterval = BUBBLE_INTERVAL + (a.bubbleJitter || 0);
                if (time - a.lastBubble > personalInterval && a.currentState) {
                    showBubble(a);
                    a.lastBubble = time;
                    a.bubbleJitter = Math.floor(Math.random() * 6000) - 3000;  // 每次刷新偏移
                }

                // Movement
                moveAgent(a, time);

                // Nametag follows sprite
                a.nametag.setPosition(a.sprite.x, a.sprite.y + 30);
            });
        }

        // ─── Movement ──────────────────────────────────────────────────
        function moveAgent(a, time) {
            if (Math.random() < 0.005 && (!a.disableRandomWander || time > a.disableRandomWander)) {
                let pt = randomPtInArea(a.currentAreaKey);
                a.targetX = pt.x;
                a.targetY = pt.y;
            }

            const dx = a.targetX - a.sprite.x;
            const dy = a.targetY - a.sprite.y;
            const speed = 1.2;
            const wobble = Math.sin(time / 200 + agents.indexOf(a) * 1.5) * 0.8;

            if (Math.abs(dx) > 3) a.sprite.x += Math.sign(dx) * speed;
            if (Math.abs(dy) > 3) a.sprite.y += Math.sign(dy) * speed;

            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                a.sprite.setY(a.sprite.y + wobble);
                if (a.sprite.anims.currentAnim && a.sprite.anims.currentAnim.key !== `${a.skinKey}_walk`)
                    a.sprite.play(`${a.skinKey}_walk`);
            } else {
                if (a.sprite.anims.currentAnim && a.sprite.anims.currentAnim.key === `${a.skinKey}_walk`)
                    a.sprite.play(`${a.skinKey}_idle`);
            }
            if (dx > 0) a.sprite.setFlipX(false);
            if (dx < 0) a.sprite.setFlipX(true);
        }

        // ─── Normalize state ───────────────────────────────────────────
        function normalizeState(s) {
            if (!s) return 'idle';
            if (s === 'working') return 'writing';
            if (s === 'run' || s === 'running') return 'executing';
            if (s === 'sync') return 'syncing';
            if (s === 'research') return 'researching';
            return s;
        }

        // ─── Fetch status (reads per-agent active_agents from backend) ──
        function fetchStatus() {
            fetch('/status')
                .then(r => r.json())
                .then(data => {
                    // active_agents: { "coder": { state, detail, updated_at }, ... }
                    const backendActive = data.active_agents || {};
                    const newWorkerIds = new Set(Object.keys(backendActive));

                    const globalState = normalizeState(data.state);
                    const stateInfo = (uiConfig.states && uiConfig.states[globalState])
                        ? uiConfig.states[globalState]
                        : { name: '待命', areas: ['slacking'] };

                    // Detect changes: which agents became active or became idle
                    agents.forEach(a => {
                        const wasWorking = activeWorkerIds.has(a.id);
                        const nowWorking = newWorkerIds.has(a.id);

                        if (nowWorking && !wasWorking) {
                            // Agent just started working → send to work area
                            let agentState = normalizeState(backendActive[a.id]?.state || globalState);
                            let si = (uiConfig.states && uiConfig.states[agentState])
                                ? uiConfig.states[agentState] : stateInfo;
                            a.currentState = agentState;
                            let areaKeys = si.areas || ['workdesk'];
                            if (!Array.isArray(areaKeys)) areaKeys = [areaKeys];
                            a.currentAreaKey = areaKeys[Math.floor(Math.random() * areaKeys.length)];
                            let pt = randomPtInArea(a.currentAreaKey);
                            a.targetX = pt.x;
                            a.targetY = pt.y;

                            let texts = uiConfig.bubbles && uiConfig.bubbles[agentState] || ['努力打工中...'];
                            // 每个Agent的气泡出现时间随机错开 0~3秒
                            setTimeout(() => showBubble(a, texts[Math.floor(Math.random() * texts.length)]), Math.random() * 3000);
                        } else if (!nowWorking && wasWorking) {
                            // Agent just stopped working → return to idle
                            a.currentState = 'idle';
                            let idleAreas = ['slacking', 'coffee'];
                            a.currentAreaKey = idleAreas[Math.floor(Math.random() * idleAreas.length)];
                            let pt = randomPtInArea(a.currentAreaKey);
                            a.targetX = pt.x;
                            a.targetY = pt.y;
                            // 每个 Agent 下班气泡随机错开 0~4秒
                            setTimeout(() => showBubble(a, '终于忙完了~'), Math.random() * 4000);
                        } else if (nowWorking && wasWorking) {
                            // Agent still working — check if state changed (e.g. executing → researching)
                            let agentState = normalizeState(backendActive[a.id]?.state || globalState);
                            if (agentState !== a.currentState) {
                                // State changed mid-work → move to correct area
                                let si = (uiConfig.states && uiConfig.states[agentState])
                                    ? uiConfig.states[agentState] : stateInfo;
                                a.currentState = agentState;
                                let areaKeys = si.areas || ['workdesk'];
                                if (!Array.isArray(areaKeys)) areaKeys = [areaKeys];
                                a.currentAreaKey = areaKeys[Math.floor(Math.random() * areaKeys.length)];
                                let pt = randomPtInArea(a.currentAreaKey);
                                a.targetX = pt.x;
                                a.targetY = pt.y;
                            }
                        }
                        // If still working, optionally update bubble on detail change
                        if (nowWorking && a.lastDetail !== (backendActive[a.id]?.detail || '')) {
                            a.lastDetail = backendActive[a.id]?.detail || '';
                        }
                    });

                    activeWorkerIds = newWorkerIds;

                    // Status bar
                    let txt = `[${stateInfo.name}] ${agents.length}个Agent`;
                    if (activeWorkerIds.size > 0) {
                        txt += ` | ${[...activeWorkerIds].join(', ')} 工作中`;
                    } else {
                        txt += ` | 全员摸鱼中`;
                    }
                    let detail = data.detail || '';
                    if (detail.includes('Assistant is') || detail.includes('自动回到')) detail = '';
                    if (detail) txt += ` : ${detail}`;
                    statusText.textContent = txt;

                    renderDashboard();
                })
                .catch(() => { statusText.textContent = '连接失败，正在重试...'; });
        }

        // ─── Dashboard ─────────────────────────────────────────────────
        function renderDashboard() {
            const container = document.getElementById('dashboard-agents');
            if (!container) return;
            container.innerHTML = '';
            agents.forEach(a => {
                let isW = activeWorkerIds.has(a.id);
                let div = document.createElement('div');
                div.className = 'dash-item';
                div.innerHTML = `
                    <span class="dot ${isW ? 'working' : 'idle'}"></span>
                    <span class="name">${a.id}</span>
                    <span class="state ${isW ? 'on' : ''}">${isW ? '工作中' : '待命'}</span>
                `;
                container.appendChild(div);
            });
        }

        // ─── Show bubble ───────────────────────────────────────────────
        function showBubble(a, forcedText) {
            if (a.bubble) { a.bubble.destroy(); a.bubble = null; }
            if (a.bubbleTimeout) clearTimeout(a.bubbleTimeout);

            let text = forcedText || null;
            if (!text) {
                let texts = ["摸鱼中...", "好困啊"];
                if (uiConfig.bubbles && uiConfig.bubbles[a.currentState]) texts = uiConfig.bubbles[a.currentState];
                else if (uiConfig.bubbles && uiConfig.bubbles['idle']) texts = uiConfig.bubbles['idle'];
                text = texts[Math.floor(Math.random() * texts.length)];
            }

            if (text.includes("咖啡") || text.includes("水") || text.includes("饮料")) {
                const ca = (uiConfig.areas && uiConfig.areas['coffee']) || { x: 868, y: 663 };
                a.targetX = ca.x + (Math.random() - 0.5) * 40;
                a.targetY = ca.y + (Math.random() - 0.5) * 40;
                a.disableRandomWander = game.time.now + 10000;
            }

            const bg = game.add.rectangle(a.sprite.x, a.sprite.y - 45, text.length * 14 + 20, 28, 0xffffff, 0.95);
            bg.setStrokeStyle(2, 0x000000);
            const txt = game.add.text(a.sprite.x, a.sprite.y - 45, text, {
                font: '12px monospace', fill: '#000', align: 'center'
            }).setOrigin(0.5);
            a.bubble = game.add.container(0, 0, [bg, txt]);
            a.bubble.setDepth(100);

            a.bubbleTimeout = setTimeout(() => {
                if (a.bubble) { a.bubble.destroy(); a.bubble = null; }
            }, 3000);
        }

        // ─── Bootstrap ─────────────────────────────────────────────────
        Promise.all([
            fetch('/api/config').then(r => r.json()).catch(() => ({})),
            fetch('/agents').then(r => r.json()).catch(() => ['main'])
        ]).then(([conf, agts]) => {
            uiConfig = conf || {};
            if (agts && Array.isArray(agts) && agts.length > 0) agentList = agts;
            new Phaser.Game(gameConfig);
        });
    </script>
</body>

</html>
